apiVersion: v1
data:
  index.html: |-
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nginx Server - Up and Running!</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .fade-in {
                animation: fadeIn 0.5s ease-out forwards;
            }
            .delay-1 { animation-delay: 0.1s; opacity: 0; }
            .delay-2 { animation-delay: 0.2s; opacity: 0; }
            .delay-3 { animation-delay: 0.3s; opacity: 0; }
            .delay-4 { animation-delay: 0.4s; opacity: 0; }
        </style>
    </head>
    <body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-blue-100 min-h-screen flex items-center justify-center p-6">
        <div class="max-w-3xl w-full">
            <!-- Main Card -->
            <div class="bg-white rounded-3xl shadow-2xl p-12 fade-in">
                <!-- Nginx Logo -->
                <div class="flex justify-center mb-8">
                    <svg class="w-20 h-20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" fill="#009639" stroke="#009639" stroke-width="2"/>
                        <text x="50" y="65" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">N</text>
                    </svg>
                </div>

                <!-- Title -->
                <h1 class="text-5xl font-bold text-gray-900 text-center mb-3 fade-in delay-1">
                    Nginx Server 
                </h1>
                <p class="text-2xl text-blue-600 font-semibold text-center mb-12 fade-in delay-2">
                    Version 0.3.0 Up and Running!
                </p>

                <!-- Server Status Box -->
                <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl p-6 mb-8 fade-in delay-2">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600 mb-1">Server Status</p>
                            <p class="text-3xl font-bold text-blue-700">Active</p>
                        </div>
                        <div class="w-4 h-4 bg-blue-500 rounded-full"></div>
                    </div>
                </div>

                <!-- Info Box -->
                <div class="bg-blue-50 border-l-4 border-blue-500 rounded-lg p-6 mb-8 fade-in delay-3">
                    <div class="flex items-start">
                        <svg class="w-6 h-6 text-blue-600 mr-3 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                        </svg>
                        <div>
                            <h3 class="text-lg font-semibold text-blue-900 mb-2">Kubernetes ConfigMap Demo</h3>
                            <p class="text-gray-700 leading-relaxed">
                                This page demonstrates loading ConfigMap volumes to an nginx container using the official nginx Docker image. It showcases how Kubernetes ConfigMaps can be mounted as volumes to serve custom HTML content in containerized nginx deployments.
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Features -->
                <div class="space-y-6 mb-8 fade-in delay-4">
                    <!-- High Performance -->
                    <div class="flex items-start">
                        <div class="flex-shrink-0 w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center mr-4">
                            <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold text-gray-900 mb-1">High Performance</h3>
                            <p class="text-gray-600">Your nginx web server is configured and ready to serve content.</p>
                        </div>
                    </div>

                    <!-- Secure & Reliable -->
                    <div class="flex items-start">
                        <div class="flex-shrink-0 w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center mr-4">
                            <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-semibold text-gray-900 mb-1">Secure & Reliable</h3>
                            <p class="text-gray-600">Built on nginx, one of the most trusted web servers worldwide.</p>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="text-center pt-8 border-t border-gray-200">
                    <p class="text-gray-500">
                        Powered by <span class="font-semibold text-gray-700">nginx</span>
                    </p>
                </div>
            </div>
        </div>
    </body>
    </html>
kind: ConfigMap
metadata:
  name: index-page
