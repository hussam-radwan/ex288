<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue-Green Deployment Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .spinner {
        animation: spin 1s linear infinite;
      }
      .blue-gradient {
        background: linear-gradient(135deg, #667eea 0%, #4c63d2 100%);
      }
      .green-gradient {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      }
    </style>
  </head>
  <body
    class="min-h-screen flex justify-center items-center bg-gradient-to-br from-indigo-500 to-purple-600 p-5"
  >
    <div
      class="bg-white rounded-3xl shadow-2xl p-10 max-w-2xl w-full text-center"
    >
      <h1 class="text-5xl font-bold text-gray-800 mb-3">
        🚀 Blue-Green Deployment
      </h1>
      <p class="text-xl text-gray-600 mb-8">Microservice Health Monitor</p>

      <div class="bg-gray-100 rounded-xl p-6 my-6">
        <div
          id="deploymentBadge"
          class="inline-block px-8 py-3 rounded-full text-2xl font-bold my-5 transition-transform duration-300 hover:scale-105 text-white"
        >
          Loading...
        </div>
        <p class="text-gray-600 mt-3">Current Deployment Version</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 my-6">
        <div class="bg-white p-5 rounded-lg border-2 border-gray-200">
          <div class="text-sm text-gray-600 mb-2">Uptime</div>
          <div class="text-xl font-bold text-gray-800" id="uptime">--</div>
        </div>
        <div class="bg-white p-5 rounded-lg border-2 border-gray-200">
          <div class="text-sm text-gray-600 mb-2">CPU Usage</div>
          <div class="text-xl font-bold text-gray-800" id="cpu">--</div>
        </div>
        <div class="bg-white p-5 rounded-lg border-2 border-gray-200">
          <div class="text-sm text-gray-600 mb-2">Memory Usage</div>
          <div class="text-xl font-bold text-gray-800" id="memory">--</div>
        </div>
        <div class="bg-white p-5 rounded-lg border-2 border-gray-200">
          <div class="text-sm text-gray-600 mb-2">Status</div>
          <div class="text-xl font-bold text-gray-800" id="status">--</div>
        </div>
      </div>

      <div class="text-left my-6">
        <h3 class="text-xl font-semibold text-gray-800 mb-4">
          Available Endpoints
        </h3>
        <div
          class="bg-white p-3 my-2 rounded-lg border-l-4 border-indigo-500 font-mono text-sm"
        >
          <span class="text-indigo-600 font-bold mr-3">GET</span>/status
        </div>
        <div
          class="bg-white p-3 my-2 rounded-lg border-l-4 border-indigo-500 font-mono text-sm"
        >
          <span class="text-indigo-600 font-bold mr-3">GET</span>/startup
        </div>
        <div
          class="bg-white p-3 my-2 rounded-lg border-l-4 border-indigo-500 font-mono text-sm"
        >
          <span class="text-indigo-600 font-bold mr-3">GET</span>/liveness
        </div>
        <div
          class="bg-white p-3 my-2 rounded-lg border-l-4 border-indigo-500 font-mono text-sm"
        >
          <span class="text-indigo-600 font-bold mr-3">GET</span>/readiness
        </div>
      </div>

      <div class="my-6">
        <button
          onclick="checkStatus()"
          class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-8 py-3 rounded-full text-base cursor-pointer mx-2 my-2 transition-all duration-200 hover:-translate-y-1 hover:shadow-lg active:translate-y-0"
        >
          🔄 Refresh Status
        </button>
        <button
          onclick="checkHealth()"
          class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white px-8 py-3 rounded-full text-base cursor-pointer mx-2 my-2 transition-all duration-200 hover:-translate-y-1 hover:shadow-lg active:translate-y-0"
        >
          ❤️ Check Health
        </button>
      </div>

      <div class="hidden my-6" id="loading">
        <div
          class="spinner border-4 border-gray-300 border-t-indigo-500 rounded-full w-10 h-10 mx-auto"
        ></div>
      </div>

      <div
        id="responseData"
        class="hidden bg-gray-100 rounded-lg p-4 my-4 text-left font-mono text-xs max-h-80 overflow-y-auto"
      ></div>
    </div>

    <script>
      async function fetchData(endpoint) {
        const loading = document.getElementById("loading");
        const responseData = document.getElementById("responseData");

        loading.classList.remove("hidden");
        responseData.classList.add("hidden");

        try {
          const response = await fetch(endpoint);
          const data = await response.json();

          loading.classList.add("hidden");
          responseData.classList.remove("hidden");
          responseData.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;

          return data;
        } catch (error) {
          loading.classList.add("hidden");
          responseData.classList.remove("hidden");
          responseData.innerHTML = `<pre class="text-red-600">Error: ${error.message}</pre>`;
          return null;
        }
      }

      async function checkStatus() {
        const data = await fetchData("/status");
        if (data && data.data) {
          updateUI(data.data);
        }
      }

      async function checkHealth() {
        await fetchData("/liveness");
      }

      function updateUI(data) {
        const badge = document.getElementById("deploymentBadge");
        const uptime = document.getElementById("uptime");
        const cpu = document.getElementById("cpu");
        const memory = document.getElementById("memory");
        const status = document.getElementById("status");

        if (data.color) {
          badge.textContent = data.color;
          if (data.color.toLowerCase() === "blue") {
            badge.className =
              "inline-block px-8 py-3 rounded-full text-2xl font-bold my-5 transition-transform duration-300 hover:scale-105 text-white blue-gradient";
          } else if (data.color.toLowerCase() === "green") {
            badge.className =
              "inline-block px-8 py-3 rounded-full text-2xl font-bold my-5 transition-transform duration-300 hover:scale-105 text-white green-gradient";
          }
        }

        if (data.uptime) {
          uptime.textContent = Math.floor(data.uptime) + "s";
        }

        // Calculate CPU usage percentage (assuming single core usage)
        if (data.cpu) {
          const cpuPercent = data.cpu; // Convert microseconds to percentage approximation
          cpu.textContent = cpuPercent + "%";
        }

        // Calculate memory usage percentage
        if (data.memory) {
          const memPercent = data.memory;
          memory.textContent = memPercent + "%";
        }

        status.textContent = "✅ Healthy";
      }

      // Load initial status
      window.addEventListener("load", checkStatus);

      // Auto-refresh every 5 seconds
      setInterval(checkStatus, 5000);
    </script>
  </body>
</html>
